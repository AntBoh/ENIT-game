<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Word Game</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>


<body>


<div id="counters">
  <div id="completedCounter">Parole completate: 0</div>
  <div id="translationsCounter">Traduzioni effettuate: 0</div>
</div>

  <h1>Traduci la parola (test6)</h1>





<div class="game-container">
  <div class="game-box">
    <div id="word"></div>
    <form id="gameForm">
  <input id="answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button id="check" type="submit">Invia</button>
  <button id="skip" type="button">Salta</button>
    </form>
    <div id="feedback"></div>
  </div>
</div>

<div id="foundContainer" class="found-container hidden">
  <div id="found"></div>
</div>



  <!-- BOTTONE HAMBURGER -->
<button id="menuBtn" class="menu-btn">☰</button>

<!-- MENU LATERALE -->
<div id="sidebar" class="sidebar">
  <button id="closeBtn" class="close-btn">×</button>

  <h2>Menu</h2>

<ul>
  <li><button id="gameBtn" class="menu-item">Gioco</button></li>
  <li><button id="worddexBtn" class="menu-item">Word-dex</button></li>
  <li><button id="settingsBtn" class="menu-item">Impostazioni</button></li>
  <li><button id="toggle" class="menu-item">Cambia lingua</button></li>

</ul>

</div>

<!-- PAGINA WORDDEX (overlay) -->
<div id="worddexPage" class="worddex-page hidden">
  <div class="worddex-topbar">
    <button id="backToGame" class="menu-item">← Torna al gioco</button>
  </div>

 <div class="worddex-body">
  <div id="accordionContainer"></div>
</div>

</div>

<!-- SOTTO-MENU IMPOSTAZIONI -->
<div id="settingsPanel" class="settings-panel">
  <h3>Impostazioni</h3>

  <button id="darkModeBtn" class="menu-item">
    🌙 Dark mode ON/OFF
  </button>
  <button id="resetBtn" class="menu-item">Reset progressi</button>
</div>






  <script src="script.js?v=1"></script>

</body>
</html>
